name: 更新搜索缓存

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libdbus-1-3 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2 \
            libatspi2.0-0 libwayland-client0

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 安装 Chromium
        run: python -m playwright install chromium

      - name: 运行搜索缓存更新
        run: python update_search_cache.py
        timeout-minutes: 30

      - name: 提交缓存更新
        run: |
          if [ -n "$(git status --porcelain public/search_cache.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/search_cache.json
            COUNT=$(cat cache_update_count.txt 2>/dev/null || echo "0")
            git commit -m "更新搜索缓存 — 新增 ${COUNT} 条 [skip ci]"
            git push
          fi

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
