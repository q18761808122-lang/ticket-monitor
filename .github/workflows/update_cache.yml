name: 更新搜索缓存

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安装 Python 依赖
        run: pip install requests

      - name: 运行搜索缓存更新
        run: python update_search_cache.py
        timeout-minutes: 10

      - name: 提交缓存更新
        run: |
          if [ -n "$(git status --porcelain public/search_cache.json cache_update_count.txt 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/search_cache.json cache_update_count.txt 2>/dev/null || true
            COUNT=$(cat cache_update_count.txt 2>/dev/null || echo "0")
            git commit -m "更新搜索缓存 — 新增 ${COUNT} 条 [skip ci]" || true
            git push || true
          fi

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
