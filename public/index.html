<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333;max-width:500px;margin:0 auto;min-height:100vh}
.header{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;padding:16px 20px;text-align:center;font-size:18px;font-weight:600;position:sticky;top:0;z-index:10}

.toggle .slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:12px;transition:.3s;cursor:pointer}
.toggle .slider:before{content:"";position:absolute;width:20px;height:20px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.3s}

@keyframes spin{to{transform:rotate(360deg)}}

@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.setup-hint{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;line-height:1.6}
input[type="text"],input[type="password"]{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px;outline:none}

</style>

<body>

<!-- жРЬзіҐй°µ -->
<div id="page-search" class="page active">

</div>

<!-- иЃЊзљЃй°µ -->
<div id="page-settings" class="page">
  <div class="setup-hint">
    йЕНзљЃ GitHub дњ°жБѓеРОпЉМжЈїеК†/еИ†йЩ§зЫСжОІдЉЪиЗ™еК®еРМж≠•еИ∞дїУеЇУгАВ<br>
    Token дїЕдњЭе≠ШеЬ®дљ†жЙЛжЬЇжЬђеЬ∞пЉМдЄНдЉЪдЄКдЉ†гАВ
  </div>
  <div class="form-group">
    <label>GitHub зФ®жИЈеРН</label>
    <input id="cfg-owner" type="text" placeholder="q18761808122-lang">

    <label>GitHub Token</label>
    <input id="cfg-token" type="password" placeholder="ghp_...">
    <small style="color:#999">йЬАи¶Б repo + workflow жЭГйЩР</small>
  </div>
  <button class="btn btn-red" style="width:100%" onclick="saveSettings()">дњЭе≠ШиЃЊзљЃ</button>
  <hr style="margin:20px 0;border-color:#eee">
  <button class="btn btn-gray" style="width:100%" onclick="loadMonitors()">еИЈжЦ∞зЫСжОІеИЧи°®</button>
</div>

<script>
// вФАвФА зКґжАБ вФАвФА
let monitors = [];
let searchCache = [];

// вФАвФА иЃЊзљЃзЃ°зРЖ вФАвФА
function getSettings() {
  return {
    owner: localStorage.getItem('gh_owner') || '',
    repo: localStorage.getItem('gh_repo') || 'ticket-monitor',
    token: localStorage.getItem('gh_token') || '',
  };
}

function saveSettings() {
  localStorage.setItem('gh_owner', document.getElementById('cfg-owner').value.trim());
  localStorage.setItem('gh_repo', document.getElementById('cfg-repo').value.trim() || 'ticket-monitor');
  localStorage.setItem('gh_token', document.getElementById('cfg-token').value.trim());
  toast('иЃЊзљЃеЈ≤дњЭе≠Ш');
}

function loadSettings() {
  const s = getSettings();
  document.getElementById('cfg-owner').value = s.owner;
  document.getElementById('cfg-repo').value = s.repo;
  document.getElementById('cfg-token').value = s.token;
}

// вФАвФА GitHub API вФАвФА
async function gh(path, method = 'GET', body = null) {
  const s = getSettings();
  if (!s.owner || !s.token) { toast('иѓЈеЕИйЕНзљЃ GitHub дњ°жБѓ'); return null; }
  const url = `https://api.github.com/repos/${s.owner}/${s.repo}/contents/${path}`;
  const headers = { Authorization: `token ${s.token}`, Accept: 'application/vnd.github.v3+json' };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(url, opts);
    return r.ok ? r.json() : null;
  } catch(e) { return null; }
}

// вФАвФА иѓїеПЦ config.jsonпЉИеЕђеЉАдїУеЇУжЧ†йЬА token дєЯиГљиѓїпЉЙ вФАвФА
async function fetchConfig() {
  // жЦєеЉП1: GitHub APIпЉИйЬАи¶Б tokenпЉЙ
  const data = await gh('config.json');
  if (data && data.content) {
    try { return JSON.parse(atob(data.content.replace(/\s/g, ''))); } catch(e) {}
  }
  // жЦєеЉП2: Raw URLпЉИеЕђеЉАдїУеЇУжЧ†йЬА tokenпЉЙ
  const s = getSettings();
  if (s.owner) {
    try {
      const r = await fetch(`https://raw.githubusercontent.com/${s.owner}/${s.repo}/main/config.json`);
      if (r.ok) return await r.json();
    } catch(e) {}
  }
  return null;
}

// вФАвФА жЫіжЦ∞ config.json вФАвФА
async function updateConfig(newCfg) {
  const data = await gh('config.json');
  if (!data) return false;
  const body = {
    message: 'жЫіжЦ∞зЫСжОІеИЧи°®',
    content: btoa(unescape(encodeURIComponent(JSON.stringify(newCfg, null, 2)))),
    sha: data.sha,
  };
  const r = await gh('config.json', 'PUT', body);
  return !!r;
}

// вФАвФА еИЗжНҐж†Зз≠Њ вФАвФА
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['search','monitors','settings'][i]===name);
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if (name==='monitors') loadMonitors();
  if (name==='settings') loadSettings();
}

// вФАвФА жРЬзіҐпЉИиЗ™еК®жРЬе§ІйЇ¶ + зЉУе≠ШиЮНеРИпЉЙ вФАвФА
const CORS_PROXIES = [
  'https://api.allorigins.win/raw?url=',
  'https://corsproxy.io/?',
  'https://api.codetabs.com/v1/proxy?quest=',
];

async function search() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) { toast('иѓЈиЊУеЕ•ж≠МжЙЛеРНжИЦжЉФеЗЇеРН'); return; }
  const el = document.getElementById('search-results');
  el.innerHTML = '<div class="empty"><span class="spinner"></span>жРЬзіҐдЄ≠вА¶</div>';

  // 1. еЕИеК†иљљзЉУе≠ШпЉИзЂЛеН≥еПѓзФ®пЉЙ
  await loadSearchCache();

  // 2. зЉУе≠ШдЄ≠жРЬзіҐ
  const results = searchCache.filter(item =>
    (item.name||'').includes(q) || (item.keywords||'').includes(q)
  );

  // 3. еРОеП∞е∞ЭиѓХеЃЮжЧґжРЬзіҐпЉИе§ІйЇ¶ API жЬЙеПНзИђпЉМдЄНдњЭиѓБжИРеКЯпЉЙ
  searchDamaiLive(q).then(liveResults => {
    if (liveResults.length > 0) {
      for (const r of liveResults) {
        if (!results.find(x => x.item_id === r.item_id)) {
          results.push(r);
        }
      }
      window._lastSearchResults = results;
      renderSearchResults(el, results, true);
    }
  }).catch(() => {});

  if (results.length === 0) {
    el.innerHTML = `<div class="empty">жЬ™жЙЊеИ∞гАМ${q}гАНзЫЄеЕ≥жЉФеЗЇ<br><small>иѓЈж£АжЯ•жЛЉеЖЩжИЦиѓХиѓХзЃАзІ∞</small><br><br><button class="btn btn-outline btn-sm" onclick="document.getElementById('search-input').value='иЦЫдєЛи∞¶';search()">иѓХиѓХжРЬгАМиЦЫдєЛи∞¶гАН</button></div>`;
    return;
  }

  window._lastSearchResults = results;
  renderSearchResults(el, results, false);
}

function renderSearchResults(el, results, hasLive) {
  el.innerHTML = results.map((r, i) => `
    <div class="card">
      <h4>${r.name}${r._fromCache ? ' <small style="color:#999">(зЉУе≠Ш)</small>' : ''}</h4>
      <div class="meta">${r.city||''} ¬Ј ${r.time||''} ¬Ј <span class="tag ${r.platform==='damai'?'tag-damai':'tag-generic'}">${r.platform==='damai'?'е§ІйЇ¶':(r.platform||'еЕґдїЦ')}</span></div>
      <div class="actions">
        <button class="btn btn-red btn-sm" onclick="addMonitorFromSearch(${i})">+ зЫСжОІ</button>
      </div>
    </div>
  `).join('');
}

async function fetchWithProxy(targetUrl, idx) {
  idx = idx || 0;
  if (idx >= CORS_PROXIES.length) return null;
  try {
    const url = CORS_PROXIES[idx] + encodeURIComponent(targetUrl);
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.text();
  } catch (e) {
    return fetchWithProxy(targetUrl, idx + 1);
  }
}

async function searchDamaiLive(keyword) {
  try {
    const html = await fetchWithProxy(`https://search.damai.cn/search.htm?keyword=${keyword}`);
    if (!html) return [];

    const results = [];
    const seen = new Set();

    // жЦєж≥Х1: еМєйЕН detail.damai.cn/item.htm?id=xxxxx
    const linkRe = /https?:\/\/detail\.damai\.cn\/item\.htm\?id=(\d+)/g;
    let m;
    while ((m = linkRe.exec(html)) !== null) {
      const id = m[1];
      if (seen.has(id)) continue;
      seen.add(id);
      const pos = m.index;
      const ctx = html.substring(Math.max(0, pos - 800), Math.min(html.length, pos + 400));
      results.push({
        name: extractName(ctx) || `${keyword} жЉФеЗЇ(ID ${id})`,
        city: extractCity(ctx),
        time: extractTime(ctx),
        platform: 'damai',
        item_id: id,
        url: `https://detail.damai.cn/item.htm?id=${id}`,
        url_mobile: `damai://V1/ProjectPage?id=${id}`,
        buy_keywords: ['зЂЛеН≥иі≠дє∞', 'зЂЛеН≥йҐДиЃҐ', 'йАЙеЇІиі≠дє∞'],
        sold_keywords: ['зЉЇиіІзЩїиЃ∞', 'еЈ≤еФЃзљД', 'жЪВжЧ†еПѓеФЃ'],
        keywords: keyword,
      });
    }

    // жЦєж≥Х2: иІ£жЮРеЖЕеµМ JSON жХ∞жНЃ
    if (results.length === 0) {
      const jsonRe = /"items"\s*:\s*(\[[\s\S]*?\])\s*[,}]/g;
      let jm;
      while ((jm = jsonRe.exec(html)) !== null) {
        try {
          const items = JSON.parse(jm[1]);
          for (const item of items) {
            const id = String(item.itemId || item.projectId || '');
            if (!id || seen.has(id)) continue;
            seen.add(id);
            results.push({
              name: item.name || item.title || item.projectName || `${keyword} жЉФеЗЇ`,
              city: item.cityName || item.city || '',
              time: item.showTime || item.performDate || '',
              platform: 'damai',
              item_id: id,
              url: `https://detail.damai.cn/item.htm?id=${id}`,
              url_mobile: `damai://V1/ProjectPage?id=${id}`,
              buy_keywords: ['зЂЛеН≥иі≠дє∞', 'зЂЛеН≥йҐДиЃҐ', 'йАЙеЇІиі≠дє∞'],
              sold_keywords: ['зЉЇиіІзЩїиЃ∞', 'еЈ≤еФЃзљД', 'жЪВжЧ†еПѓеФЃ'],
              keywords: keyword,
            });
          }
        } catch(e) {}
      }
    }

    return results;
  } catch (e) {
    console.log('еЃЮжЧґжРЬзіҐе§±иі•: ' + e.message);
    return [];
  }
}

function extractName(ctx) {
  const m = ctx.match(/(?:title|alt)=["']([^"']*(?:жЉФеФ±дЉЪ|йЯ≥дєРдЉЪ|иѓЭеЙІ|е±ХиІИ|жѓФиµЫ|йЯ≥дєРиКВ|Live|жИПеЙІ|ж≠МеЙІ|иИЮиєИ|дЇ≤е≠Р|зЫЄе£∞|жИПжЫ≤|дљУиВ≤|еЈ°жЉФ)[^"']*)/i);
  if (m) return m[1].replace(/<[^>]+>/g, '').trim();
  const m2 = ctx.match(/>([^<]{6,80})<\//);
  return m2 ? m2[1].replace(/<[^>]+>/g, '').trim() : '';
}

function extractCity(ctx) {
  const cities = 'еМЧдЇђ|дЄКжµЈ|еєњеЈЮ|жЈ±еЬ≥|жИРйГљ|йЗНеЇЖ|жЭ≠еЈЮ|ж≠¶ж±Й|и•њеЃЙ|еНЧдЇђ|е§©жі•|иЛПеЈЮ|йХњж≤Щ|йГСеЈЮ|ж≤ИйШ≥|йЭТе≤Ы|е§ІињЮ|дЄЬиОЮ|еЃБж≥Ґ|еО¶йЧ®|з¶ПеЈЮ|еРИиВ•|жЧ†йФ°|дљЫе±±|жШЖжШО|иіµйШ≥|еНЧеЃБ|еНЧжШМ|еУИе∞Фжї®|йХњжШ•|зЯ≥еЃґеЇД|е§™еОЯ|жµОеНЧ|еЕ∞еЈЮ|йУґеЈЭ|и•њеЃБ|жЛЙиР®|жµЈеП£|еСЉеТМжµ©зЙє|дєМй≤БжЬ®йљР';
  const m = ctx.match(new RegExp(cities));
  return m ? m[0] : '';
}

function extractTime(ctx) {
  const m = ctx.match(/(\d{4}[.\-/]\d{1,2}[.\-/]\d{1,2}[^<]{0,20})/);
  return m ? m[1].trim() : '';
}

function addMonitorFromSearch(idx) {
  const r = window._lastSearchResults[idx];
  if (!r) return;
  addToMonitors({
    id: (r.platform || 'damai') + '_' + (r.item_id || Date.now()),
    enabled: true,
    platform: r.platform === 'damai' ? 'damai' : 'generic',
    mode: r.mode || 'page',
    label: r.name,
    url: r.url || '',
    item_id: r.item_id || '',
    buy_url: r.buy_url || r.url || '',
    buy_url_mobile: r.url_mobile || r.url || '',
    buy_keywords: r.buy_keywords || ['зЂЛеН≥иі≠дє∞', 'йАЙеЇІиі≠дє∞', 'зЂЛеН≥йҐДиЃҐ'],
    sold_keywords: r.sold_keywords || ['еЈ≤еФЃзљД', 'еФЃзљД', 'зЉЇиіІзЩїиЃ∞'],
    comment: [r.city, r.time].filter(Boolean).join(' ¬Ј '),
  });
}

async function addToMonitors(cfg) {
  const c = await fetchConfig();
  if (!c) {
    const s = getSettings();
    if (!s.owner) { toast('иѓЈеЕИеЬ®гАМиЃЊзљЃгАНй°µе°ЂеЖЩ GitHub зФ®жИЈеРН'); return; }
    toast('иѓїеПЦйЕНзљЃе§±иі•пЉМж£АжЯ•зФ®жИЈеРНеТМдїУеЇУеРНжШѓеР¶ж≠£з°Ѓ');
    return;
  }
  c.monitors = c.monitors || [];
  if (c.monitors.find(m => m.id === cfg.id)) {
    cfg.id = cfg.id + '_' + Math.random().toString(36).slice(2,6);
  }
  c.monitors.push(cfg);
  const ok = await updateConfig(c);
  if (ok) {
    toast('еЈ≤жЈїеК†зЫСжОІпЉЪ' + cfg.label);
    document.getElementById('manual-url').value = '';
    document.getElementById('manual-label').value = '';
  } else {
    toast('еЖЩеЕ•е§±иі•пЉМиѓЈж£АжЯ• Token жШѓеР¶жЬЙ repo жЭГйЩР');
  }
}

function addManual() {
  const url = document.getElementById('manual-url').value.trim();
  const label = document.getElementById('manual-label').value.trim();
  const platform = document.getElementById('manual-platform').value;
  if (!url) { toast('иѓЈз≤ШиііжЉФеЗЇй°µйЭҐ URL'); return; }

// вФАвФА зЫСжОІеИЧи°® вФАвФА
async function loadMonitors() {
  const el = document.getElementById('monitor-list');
  const emptyEl = document.getElementById('monitor-empty');
  el.innerHTML = '<div class="empty"><span class="spinner"></span>еК†иљљдЄ≠...</div>';

  const c = await fetchConfig();
  if (!c) { el.innerHTML = ''; emptyEl.style.display = 'block'; return; }
  monitors = c.monitors || [];

  if (monitors.length === 0) {
    el.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  el.innerHTML = monitors.map((m,i) => `
    <div class="monitor-row">
      <div class="monitor-info">
        <div class="name">
          <span class="tag ${m.platform==='damai'?'tag-damai':'tag-generic'}">${m.platform==='damai'?'е§ІйЇ¶':'йАЪзФ®'}</span>
          ${m.label}
        </div>
        <div class="url">${m.url||m.item_id||''}</div>
      </div>
      <div class="monitor-actions">
        <label class="toggle">
          <input type="checkbox" ${m.enabled!==false?'checked':''} onchange="toggleMonitor(${i})">
          <span class="slider"></span>
        </label>
        <button class="btn btn-outline btn-sm" onclick="deleteMonitor(${i})">еИ†йЩ§</button>
      </div>
    </div>
  `).join('');
}

async function toggleMonitor(idx) {
  const c = await fetchConfig();
  if (!c) return;
  c.monitors[idx].enabled = !c.monitors[idx].enabled;
  await updateConfig(c);
  monitors = c.monitors;
}

async function deleteMonitor(idx) {
  if (!confirm('з°ЃеЃЪеИ†йЩ§гАМ' + monitors[idx].label + 'гАНпЉЯ')) return;
  const c = await fetchConfig();
  if (!c) return;
  c.monitors.splice(idx, 1);
  await updateConfig(c);
  monitors = c.monitors;
  loadMonitors();
}

  ];

// вФАвФА Toast вФАвФА
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}
