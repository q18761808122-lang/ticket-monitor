<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="票务监控">
<title>票务监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#333;max-width:500px;margin:0 auto;min-height:100vh}
.header{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;padding:16px 20px;text-align:center;font-size:18px;font-weight:600;position:sticky;top:0;z-index:10}
.tabs{display:flex;background:#fff;border-bottom:1px solid #eee;position:sticky;top:52px;z-index:10}
.tab{flex:1;text-align:center;padding:12px;font-size:14px;color:#999;border-bottom:2px solid transparent;cursor:pointer;transition:.2s}
.tab.active{color:#e74c3c;border-bottom-color:#e74c3c;font-weight:600}
.page{display:none;padding:16px}
.page.active{display:block}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h4{font-size:15px;margin-bottom:6px;line-height:1.4}
.card .meta{font-size:12px;color:#999;margin-bottom:8px}
.card .actions{display:flex;gap:8px;justify-content:flex-end}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;border:none;cursor:pointer;font-weight:500;transition:.2s}
.btn-red{background:#e74c3c;color:#fff}
.btn-red:active{background:#c0392b}
.btn-outline{background:#fff;color:#e74c3c;border:1px solid #e74c3c}
.btn-outline:active{background:#fef0ef}
.btn-gray{background:#eee;color:#666}
.btn-gray:active{background:#ddd}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-block{display:block;width:100%;text-align:center}
.search-box{display:flex;gap:8px;margin-bottom:16px}
.search-box input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.search-box input:focus{border-color:#e74c3c}
.search-box button{padding:10px 20px;white-space:nowrap}
.empty{text-align:center;padding:40px 20px;color:#999;font-size:14px}
.toggle{position:relative;width:44px;height:24px;display:inline-block}
.toggle input{display:none}
.toggle .slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:12px;transition:.3s;cursor:pointer}
.toggle .slider:before{content:"";position:absolute;width:20px;height:20px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked+.slider{background:#2ecc71}
.toggle input:checked+.slider:before{transform:translateX(20px)}
.monitor-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.monitor-row:last-child{border-bottom:none}
.monitor-info{flex:1;min-width:0}
.monitor-info .name{font-size:14px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.monitor-info .url{font-size:11px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.monitor-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:4px}
.tag-damai{background:#fff0f0;color:#e74c3c}
.tag-generic{background:#f0f0ff;color:#3498db}
.tag-douyin{background:#fff0f8;color:#ff4088}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#e74c3c;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:100;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.setup-hint{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;line-height:1.6}
.stats{display:flex;gap:12px;margin-bottom:16px}
.stats .stat{flex:1;background:#fff;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.stats .stat .num{font-size:24px;font-weight:700;color:#e74c3c}
.stats .stat .lbl{font-size:11px;color:#999;margin-top:4px}
input[type="text"],input[type="password"]{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px;outline:none}
input[type="text"]:focus,input[type="password"]:focus{border-color:#e74c3c}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;color:#666;margin-bottom:4px;font-weight:500}
.search-tip{font-size:12px;color:#999;margin-top:6px}
.in-monitor{opacity:.5;pointer-events:none}
.in-monitor .btn{background:#ccc!important}
</style>
</head>
<body>

<div class="header">票务监控</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('search')">搜索</div>
  <div class="tab" onclick="switchTab('monitors')">监控</div>
  <div class="tab" onclick="switchTab('settings')">设置</div>
</div>

<!-- 搜索页 -->
<div id="page-search" class="page active">
  <div class="stats" id="cache-stats" style="display:none">
    <div class="stat"><div class="num" id="stat-shows">0</div><div class="lbl">演出数</div></div>
    <div class="stat"><div class="num" id="stat-singers">0</div><div class="lbl">歌手数</div></div>
    <div class="stat"><div class="num" id="stat-monitors">0</div><div class="lbl">监控中</div></div>
  </div>
  <div class="search-box">
    <input id="search-input" type="text" placeholder="输入歌手名，如：薛之谦、周杰伦..." onkeydown="if(event.key==='Enter')search()">
    <button class="btn btn-red" onclick="search()">搜索</button>
  </div>
  <div class="search-tip">数据来自票星球搜索结果，每 30 分钟自动更新</div>
  <div id="search-results"></div>
  <div style="margin-top:24px;padding-top:16px;border-top:1px solid #eee">
    <h5 style="font-size:14px;color:#666;margin-bottom:10px">手动添加监控</h5>
    <input id="manual-url" type="text" placeholder="粘贴演出页面 URL（如大麦/猫眼/票星球链接）">
    <input id="manual-label" type="text" placeholder="名称，如：薛之谦太原站（大麦）">
    <select id="manual-platform" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px">
      <option value="generic">通用（页面关键词检测）</option>
      <option value="damai">大麦</option>
    </select>
    <button class="btn btn-red btn-block" onclick="addManual()">添加监控</button>
  </div>
</div>

<!-- 监控页 -->
<div id="page-monitors" class="page">
  <div id="monitor-stats" class="stats" style="display:none">
    <div class="stat"><div class="num" id="mstat-total">0</div><div class="lbl">监控项</div></div>
    <div class="stat"><div class="num" id="mstat-enabled">0</div><div class="lbl">已启用</div></div>
  </div>
  <div id="monitor-list"></div>
  <div class="empty" id="monitor-empty" style="display:none">暂无监控项<br><small>去「搜索」页添加，或手动粘贴链接</small></div>
</div>

<!-- 设置页 -->
<div id="page-settings" class="page">
  <div class="setup-hint">
    配置 GitHub 信息后可在手机端管理监控。<br>
    Token 仅保存在你手机本地，不会上传到任何第三方。
  </div>
  <div class="form-group">
    <label>GitHub 用户名</label>
    <input id="cfg-owner" type="text" placeholder="你的 GitHub 用户名">
  </div>
  <div class="form-group">
    <label>仓库名</label>
    <input id="cfg-repo" type="text" placeholder="ticket-monitor">
  </div>
  <div class="form-group">
    <label>GitHub Token</label>
    <input id="cfg-token" type="password" placeholder="ghp_...">
    <small style="color:#999">需要 repo 权限。在 GitHub Settings → Developer settings → Tokens 创建</small>
  </div>
  <button class="btn btn-red btn-block" onclick="saveSettings()">保存设置</button>
  <hr style="margin:20px 0;border-color:#eee">
  <button class="btn btn-outline btn-block" onclick="triggerScan()">触发搜索扫描（GitHub Actions）</button>
  <small style="display:block;text-align:center;margin-top:8px;color:#999">扫描完成后等待约 2 分钟，刷新页面即可看到新演出</small>
  <hr style="margin:20px 0;border-color:#eee">
  <button class="btn btn-gray btn-block" onclick="loadMonitors()">刷新监控列表</button>
</div>

<script>
// ── 状态 ──
let monitors = [];
let searchCache = [];
let monitorIds = new Set();

// ── 设置管理 ──
function getSettings() {
  return {
    owner: localStorage.getItem('gh_owner') || '',
    repo: localStorage.getItem('gh_repo') || 'ticket-monitor',
    token: localStorage.getItem('gh_token') || '',
  };
}

function saveSettings() {
  localStorage.setItem('gh_owner', document.getElementById('cfg-owner').value.trim());
  localStorage.setItem('gh_repo', document.getElementById('cfg-repo').value.trim() || 'ticket-monitor');
  localStorage.setItem('gh_token', document.getElementById('cfg-token').value.trim());
  toast('设置已保存');
}

function loadSettings() {
  const s = getSettings();
  document.getElementById('cfg-owner').value = s.owner;
  document.getElementById('cfg-repo').value = s.repo;
  document.getElementById('cfg-token').value = s.token;
}

// ── GitHub API ──
async function gh(path, method = 'GET', body = null) {
  const s = getSettings();
  if (!s.owner || !s.token) { toast('请先配置 GitHub 信息'); return null; }
  const url = `https://api.github.com/repos/${s.owner}/${s.repo}/contents/${path}`;
  const headers = { Authorization: `token ${s.token}`, Accept: 'application/vnd.github.v3+json' };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(url, opts);
    return r.ok ? r.json() : null;
  } catch(e) { return null; }
}

// ── 读取 config.json ──
async function fetchConfig() {
  const s = getSettings();
  if (s.owner) {
    try {
      const r = await fetch(`https://raw.githubusercontent.com/${s.owner}/${s.repo}/main/config.json`);
      if (r.ok) return await r.json();
    } catch(e) {}
  }
  const data = await gh('config.json');
  if (data && data.content) {
    try { return JSON.parse(base64ToUtf8(data.content)); } catch(e) {}
  }
  return null;
}

function utf8ToBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function base64ToUtf8(b64) {
  const bin = atob(b64.replace(/\s/g, ''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}

async function updateConfig(newCfg) {
  const data = await gh('config.json');
  if (!data) return false;
  const body = {
    message: '更新监控列表',
    content: utf8ToBase64(JSON.stringify(newCfg, null, 2)),
    sha: data.sha,
  };
  const r = await gh('config.json', 'PUT', body);
  return !!r;
}

// ── 触发 GitHub Actions 扫描 ──
async function triggerScan() {
  const s = getSettings();
  if (!s.owner || !s.token) { toast('请先配置 GitHub 信息'); return; }
  try {
    const r = await fetch(
      `https://api.github.com/repos/${s.owner}/${s.repo}/actions/workflows/monitor.yml/dispatches`,
      { method: 'POST',
        headers: { Authorization: `token ${s.token}`, Accept: 'application/vnd.github.v3+json' },
        body: JSON.stringify({ ref: 'main', inputs: { search_only: 'true' } })
      });
    if (r.ok || r.status === 204) {
      toast('扫描已触发，约 2 分钟后刷新页面查看');
    } else {
      toast('触发失败: HTTP ' + r.status);
    }
  } catch(e) {
    toast('网络错误: ' + e.message);
  }
}

// ── 切换标签 ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active', ['search','monitors','settings'][i]===name);
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if (name==='monitors') loadMonitors();
  if (name==='settings') loadSettings();
}

// ── 搜索 ──
async function search() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) { toast('请输入歌手名'); return; }
  const el = document.getElementById('search-results');
  el.innerHTML = '<div class="empty"><span class="spinner"></span>搜索中...</div>';

  await loadSearchCache();
  await loadMonitorIds();

  const results = searchCache.filter(item =>
    (item.name||'').includes(q) || (item.keywords||'').includes(q)
  );

  if (results.length === 0) {
    el.innerHTML = `<div class="empty">未找到「${q}」相关演出<br><small>试试搜索：薛之谦、周杰伦、五月天、蔡依林...</small><br><br>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('search-input').value='薛之谦';search()">薛之谦</button>
      <button class="btn btn-outline btn-sm" style="margin-left:8px" onclick="document.getElementById('search-input').value='周杰伦';search()">周杰伦</button>
    </div>`;
    return;
  }

  window._lastSearchResults = results;
  renderSearchResults(el, results);
  updateStats();
}

function renderSearchResults(el, results) {
  el.innerHTML = results.map((r, i) => {
    const isMonitoring = monitorIds.has(r.item_id || '') || monitorIds.has((r.platform||'generic')+'_'+r.item_id);
    const btnHtml = isMonitoring
      ? '<button class="btn btn-gray btn-sm" disabled>已监控</button>'
      : `<button class="btn btn-red btn-sm" onclick="addMonitorFromSearch(${i})">+ 监控</button>`;
    return `
    <div class="card${isMonitoring?' in-monitor':''}">
      <h4>${escHtml(r.name)}</h4>
      <div class="meta">
        ${r.city ? escHtml(r.city)+' · ' : ''}
        ${r.time ? escHtml(r.time)+' · ' : ''}
        <span class="tag ${r.platform==='damai'?'tag-damai':'tag-generic'}">${r.platform==='damai'?'大麦':r.platform||'其他'}</span>
      </div>
      <div class="actions">${btnHtml}</div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── 加载搜索缓存 ──
async function loadSearchCache() {
  if (searchCache.length > 0) return;
  // 同源加载（GitHub Pages 部署后 work）
  try {
    const r = await fetch('search_cache.json');
    if (r.ok) { searchCache = await r.json(); updateStats(); return; }
  } catch(e) {}
  // GitHub Raw
  const s = getSettings();
  if (s.owner) {
    try {
      const r = await fetch(`https://raw.githubusercontent.com/${s.owner}/${s.repo}/main/public/search_cache.json`);
      if (r.ok) { searchCache = await r.json(); updateStats(); return; }
    } catch(e) {}
  }
  // 内置默认（精简版）
  searchCache = [
    {name:"薛之谦「万兽之王」巡回演唱会-太原站",city:"太原",time:"2026.04.24-05.03",platform:"damai",item_id:"1030416581941",url:"https://detail.damai.cn/item.htm?id=1030416581941",url_mobile:"damai://V1/ProjectPage?id=1030416581941",buy_url:"https://detail.damai.cn/item.htm?id=1030416581941",buy_keywords:["立即购买","立即预订","选座购买"],sold_keywords:["缺货登记","已售罄","暂无可售"],mode:"page",keywords:"薛之谦"}
  ];
}

function updateStats() {
  document.getElementById('cache-stats').style.display = searchCache.length ? 'flex' : 'none';
  document.getElementById('stat-shows').textContent = searchCache.length;
  const singers = new Set(searchCache.map(x => x.keywords).filter(Boolean));
  document.getElementById('stat-singers').textContent = singers.size;
  document.getElementById('stat-monitors').textContent = monitorIds.size;
}

// ── 加载当前监控 ID 集合 ──
async function loadMonitorIds() {
  if (monitorIds.size > 0) return;
  const c = await fetchConfig();
  if (c && c.monitors) {
    monitors = c.monitors;
    c.monitors.forEach(m => {
      if (m.item_id) monitorIds.add(m.item_id);
      monitorIds.add(m.id || '');
    });
  }
}

// ── 从搜索结果添加监控 ──
function addMonitorFromSearch(idx) {
  const r = window._lastSearchResults[idx];
  if (!r) return;
  const id = (r.platform || 'generic') + '_' + (r.item_id || Date.now());
  if (monitorIds.has(id) || monitorIds.has(r.item_id || '')) {
    toast('已在监控列表中');
    return;
  }
  addToMonitors({
    id: id,
    enabled: true,
    platform: r.platform || 'generic',
    mode: r.mode || 'page',
    label: r.name,
    url: r.url || r.buy_url || '',
    item_id: r.item_id || '',
    buy_url: r.buy_url || r.url || '',
    buy_url_mobile: r.url_mobile || r.url || '',
    buy_keywords: r.buy_keywords || ['立即购买', '选座购买', '去购买', '立即预订'],
    sold_keywords: r.sold_keywords || ['已售罄', '售罄', '缺货登记', '下架'],
    comment: [r.city, r.time].filter(Boolean).join(' · '),
  });
}

async function addToMonitors(cfg) {
  const c = await fetchConfig();
  if (!c) {
    toast('请先在「设置」页填写 GitHub 信息');
    return;
  }
  c.monitors = c.monitors || [];
  if (c.monitors.find(m => m.id === cfg.id)) {
    cfg.id = cfg.id + '_' + Math.random().toString(36).slice(2,6);
  }
  c.monitors.push(cfg);
  const ok = await updateConfig(c);
  if (ok) {
    monitorIds.add(cfg.id);
    if (cfg.item_id) monitorIds.add(cfg.item_id);
    monitors = c.monitors;
    toast('已添加: ' + cfg.label);
    // 刷新搜索结果显示已监控
    if (window._lastSearchResults) {
      renderSearchResults(document.getElementById('search-results'), window._lastSearchResults);
    }
    updateStats();
  } else {
    toast('写入失败，请检查 Token 权限');
  }
}

function addManual() {
  const url = document.getElementById('manual-url').value.trim();
  const label = document.getElementById('manual-label').value.trim();
  const platform = document.getElementById('manual-platform').value;
  if (!url) { toast('请粘贴演出页面 URL'); return; }
  if (!label) { toast('请填写名称'); return; }
  addToMonitors({
    id: platform + '_manual_' + Date.now(),
    enabled: true,
    platform: platform,
    mode: 'page',
    label: label,
    url: url,
    buy_url: url,
    buy_url_mobile: url,
    buy_keywords: platform === 'damai' ? ['立即购买', '立即预订', '选座购买'] : ['立即购买', '选座购买', '去购买', '立即预订'],
    sold_keywords: platform === 'damai' ? ['缺货登记', '已售罄', '暂无可售'] : ['已售罄', '售罄', '缺货登记'],
    comment: '手动添加',
  });
}

// ── 监控列表 ──
async function loadMonitors() {
  const el = document.getElementById('monitor-list');
  const emptyEl = document.getElementById('monitor-empty');
  const statsEl = document.getElementById('monitor-stats');
  el.innerHTML = '<div class="empty"><span class="spinner"></span>加载中...</div>';

  const c = await fetchConfig();
  if (!c || !c.monitors || c.monitors.length === 0) {
    el.innerHTML = '';
    emptyEl.style.display = 'block';
    statsEl.style.display = 'none';
    return;
  }
  monitors = c.monitors;
  monitorIds = new Set();
  monitors.forEach(m => {
    if (m.item_id) monitorIds.add(m.item_id);
    monitorIds.add(m.id || '');
  });

  emptyEl.style.display = 'none';
  statsEl.style.display = 'flex';
  document.getElementById('mstat-total').textContent = monitors.length;
  document.getElementById('mstat-enabled').textContent = monitors.filter(m => m.enabled !== false).length;

  el.innerHTML = monitors.map((m,i) => `
    <div class="monitor-row">
      <div class="monitor-info">
        <div class="name">
          <span class="tag ${m.platform==='damai'?'tag-damai':'tag-generic'}">${m.platform==='damai'?'大麦':m.platform||'通用'}</span>
          ${escHtml(m.label||'')}
        </div>
        <div class="url">${escHtml(m.url||m.item_id||'')}</div>
      </div>
      <div class="monitor-actions">
        <label class="toggle">
          <input type="checkbox" ${m.enabled!==false?'checked':''} onchange="toggleMonitor(${i})">
          <span class="slider"></span>
        </label>
        <button class="btn btn-outline btn-sm" onclick="deleteMonitor(${i})">删</button>
      </div>
    </div>
  `).join('');
  updateStats();
}

async function toggleMonitor(idx) {
  const c = await fetchConfig();
  if (!c) return;
  c.monitors[idx].enabled = !c.monitors[idx].enabled;
  await updateConfig(c);
  monitors = c.monitors;
}

async function deleteMonitor(idx) {
  const m = monitors[idx];
  if (!confirm('删除「' + m.label + '」？')) return;
  const c = await fetchConfig();
  if (!c) return;
  c.monitors.splice(idx, 1);
  const ok = await updateConfig(c);
  if (ok) {
    monitors = c.monitors;
    loadMonitors();
  }
}

// ── Toast ──
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ── 初始化 ──
loadSettings();
loadSearchCache();
loadMonitorIds();
</script>
</body>
</html>
